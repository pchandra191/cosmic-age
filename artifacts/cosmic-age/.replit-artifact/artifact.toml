kind = "mobile"
previewPath = "/"
title = "Cosmic Age"
version = "1.0.0"
id = "artifacts/cosmic-age"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 20178

[services.development]
run = "pnpm --filter @workspace/cosmic-age run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cosmic-age", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cosmic-age", "run", "serve" ]

[services.env]
PORT = "20178"
BASE_PATH = "/"
